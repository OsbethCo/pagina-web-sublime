{% extends 'base.html' %}

{% block content %}
<div class="auth-container" style="max-width: 400px; margin: 5rem auto; background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid var(--border-color);">
    <h1 style="text-align: center; margin-bottom: 30px; color: var(--text-color);">INICIAR SESIÓN</h1>
    
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 10px;">Usuario o Email</label>
            <input type="text" name="username" required style="width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 5px;">
        </div>
        
        <div class="form-group" style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 10px;">Contraseña</label>
            <input type="password" name="password" required style="width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 5px;">
        </div>
        
        <button type="submit" class="btn-primary" style="width: 100%;">ENTRAR</button>
    </form>
    
    <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
        ¿No tienes cuenta? <a href="{{ url_for('registro') }}" style="color: #FF0000;">Regístrate aquí</a>
    </p>
</div>
{% endblock %}
