{% extends 'base.html' %}

{% block content %}
<div class="page-header" style="text-align: center; margin: 3rem 0;">
    <h1 class="hero-title-solid" style="font-size: 3rem;">CHECKOUT</h1>
</div>

<div class="checkout-container" style="display: flex; gap: 40px; max-width: 1000px; margin: 0 auto; padding-bottom: 50px;">
    
    <div class="checkout-form" style="flex: 2; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border-color);">
        <h2 style="margin-bottom: 20px;">Dirección y Envío</h2>
        <form action="{{ url_for('checkout') }}" method="POST">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px;">Nombre Completo</label>
                <input type="text" name="name" required style="width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 5px;">
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px;">Dirección de Envío Completa</label>
                <textarea name="address" required rows="3" style="width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 5px;"></textarea>
            </div>

            <h2 style="margin: 30px 0 20px 0;">Pago (Simulación)</h2>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 10px;">Número de Tarjeta</label>
                <input type="text" placeholder="XXXX-XXXX-XXXX-XXXX" style="width: 100%; padding: 12px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 5px;">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">CONFIRMAR Y PAGAR</button>
        </form>
    </div>
    
    <div class="checkout-summary" style="flex: 1; background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid var(--border-color); height: fit-content;">
        <h2 style="margin-bottom: 20px; color: #FF0000;">Resumen</h2>
        <p style="display: flex; justify-content: space-between;"><span>Subtotal:</span> <span>${{ "%.2f"|format(total) }}</span></p>
        <p style="display: flex; justify-content: space-between;"><span>Envío:</span> <span>$5.00</span></p>
        <hr style="border-color: var(--border-color); margin: 15px 0;">
        <h3 style="display: flex; justify-content: space-between; color: #FF0000;"><span>TOTAL:</span> <span>${{ "%.2f"|format(total + 5.00) }}</span></h3>
    </div>
</div>
{% endblock %}
